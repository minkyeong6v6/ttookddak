// ── 광고 소재 미리보기 (세이프존 + AI 시안 오버레이) ─────────────
function AdPreview({ fmt, headline }) {
  const maxW = 300, maxH = 420;
  const scale = Math.min(maxW / fmt.w, maxH / fmt.h);
  const w = fmt.w * scale, h = fmt.h * scale;
  const inset = 0.1;

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
      <div style={{ position: "relative", width: w, height: h, background: T.pale, border: `2px solid ${T.navy}`, borderRadius: 8, overflow: "hidden", boxShadow: "0 8px 28px rgba(3,54,99,0.14)" }}>
        <div style={{ position: "absolute", inset: 0, backgroundImage: `linear-gradient(${T.line} 1px, transparent 1px), linear-gradient(90deg, ${T.line} 1px, transparent 1px)`, backgroundSize: "16px 16px", opacity: 0.5 }} />
        {/* 10% 세이프존 + AI 헤드라인 시안 */}
        <div style={{ position: "absolute", left: w * inset, top: h * inset, width: w * (1 - inset * 2), height: h * (1 - inset * 2), border: `1.5px dashed ${T.blue}`, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", padding: 8, textAlign: "center" }}>
          {headline ? (
            <span style={{ fontFamily: UI, fontWeight: 800, color: T.navy, fontSize: Math.max(11, Math.min(w, h) * 0.085), lineHeight: 1.28, textShadow: "0 1px 0 rgba(255,255,255,0.7)" }}>{headline}</span>
          ) : (
            <span style={{ fontFamily: MONO, fontSize: 10, color: T.blue, background: T.white, padding: "1px 5px", borderRadius: 3, opacity: 0.92 }}>SAFE 10%</span>
          )}
        </div>
        {(fmt.zones || []).map((z, i) => {
          const isCta = z.kind === "cta";
          const col = isCta ? T.blue : T.coral;
          let s = { position: "absolute", borderColor: col };
          if (z.side === "top") s = { ...s, left: 0, top: 0, width: w, height: (z.px / fmt.h) * h, borderBottom: `1.5px dashed ${col}` };
          if (z.side === "bottom") s = { ...s, left: 0, bottom: 0, width: w, height: (z.px / fmt.h) * h, borderTop: `1.5px dashed ${col}` };
          if (z.side === "right") s = { ...s, right: 0, top: 0, width: (z.px / fmt.w) * w, height: h, borderLeft: `1.5px dashed ${col}` };
          return (
            <div key={i} style={{ ...s, display: "flex", alignItems: "center", justifyContent: "center", backgroundImage: `repeating-linear-gradient(45deg, ${col}1f 0, ${col}1f 6px, transparent 6px, transparent 12px)` }}>
              <span style={{ fontFamily: MONO, fontSize: 9, color: col, fontWeight: 700, textAlign: "center", lineHeight: 1.3 }}>{z.text}<br />{z.px}px</span>
            </div>
          );
        })}
        <div style={{ position: "absolute", right: 6, bottom: 4, fontFamily: MONO, fontWeight: 700, fontSize: Math.min(w, h) * 0.28, color: `${T.navy}14`, lineHeight: 1 }}>3</div>
      </div>
      <div style={{ fontFamily: MONO, fontSize: 13, color: T.navy, fontWeight: 700 }}>
        {fmt.w} × {fmt.h}<span style={{ color: T.sub, fontWeight: 400 }}> · {fmt.ratio}</span>
      </div>
    </div>
  );
}

const scanCopy = (text) => {
  const t = String(text || "");
  const hits = [];
  BANNED.forEach((b) => { if (t.includes(b.p)) hits.push(`‘${b.p}’ — ${b.why}`); });
  BANNED_RE.forEach((b) => { if (b.re.test(t)) hits.push(b.label); });
  return hits;
};

  const plat = PLATFORMS[platIdx];
  const fmt = FMT_BY_ID[fmtId];
  const [toast, setToast] = useState("");
  const [copyEdits, setCopyEdits] = useState({}); // platformId → {headline, sub, cta}
  const [grounds, setGrounds] = useState("medical");

  // AI 채널 카피 → 플랫폼 id 매핑 (편집의 기본값)
  const copyByPlatform = useMemo(() => {
    const map = {};
    const arr = (aiResult && aiResult["채널카피"]) || [];
    arr.forEach((c) => {
      const found = AI_CHANNELS.find((ch) => c.channel && String(c.channel).includes(ch.name));
      if (found) map[found.id] = c;
    });
    return map;
  }, [aiResult]);

  // 효과적 카피 = 사용자 편집값 ?? AI 생성값 ?? 빈값
  const effCopy = (pid) => {
    const base = copyByPlatform[pid] || {};
    const e = copyEdits[pid] || {};
    return {
      headline: e.headline !== undefined ? e.headline : (base.headline || ""),
      sub: e.sub !== undefined ? e.sub : (base.sub || ""),
      cta: e.cta !== undefined ? e.cta : (base.cta || ""),
    };
  };
  const setCopy = (k, v) => setCopyEdits((m) => ({ ...m, [fmt.platformId]: { ...(m[fmt.platformId] || {}), [k]: v } }));
  const resetCopy = () => setCopyEdits((m) => { const n = { ...m }; delete n[fmt.platformId]; return n; });
  const curCopy = effCopy(fmt.platformId);
  const hasBase = !!copyByPlatform[fmt.platformId];
  const edited = !!copyEdits[fmt.platformId];
  const copyAllText = `${curCopy.headline} ${curCopy.sub} ${curCopy.cta}`;
  const warns = scanCopy(copyAllText);
  const hasAmount = AMOUNT_RE.test(copyAllText);
  const isVideo = /MP4/i.test(fmt.fmt);
  const g = GROUNDS.find((x) => x.id === grounds) || GROUNDS[0];
  const lim = limForPlat(fmt.platformId);

  const inCart = cart.includes(fmtId);
  const toggleCart = () => setCart((c) => (c.includes(fmtId) ? c.filter((x) => x !== fmtId) : [...c, fmtId]));

  const addChannelSet = () => {
    const ids = [];
    channels.forEach((cid) => { const p = PLATFORMS.find((x) => x.id === cid); if (p) p.formats.forEach((f) => ids.push(f.id)); });
    setCart((c) => Array.from(new Set([...c, ...ids])));
    setToast(`선택 채널 소재 ${ids.length}건을 담았어요`);
    setTimeout(() => setToast(""), 2400);
  };

  const briefText = useMemo(() => {
    const lines = [];
    lines.push("[삼쩜삼 광고 소재 발주 브리프]");
    lines.push(`캠페인: ${campaign || "(미입력)"}`);
    lines.push(`작성일: ${new Date().toISOString().slice(0, 10)}`);
    lines.push(`소재 수: ${cart.length}건`);
    lines.push("");
    cart.forEach((id, i) => {
      const f = FMT_BY_ID[id];
      const cc = effCopy(f.platformId);
      lines.push(`${i + 1}. ${f.platform} — ${f.label}`);
      lines.push(`   · 사이즈: ${f.w} × ${f.h} px (${f.ratio})`);
      lines.push(`   · 포맷: ${f.fmt} / 최대 ${f.max}`);
      if (cc.headline || cc.sub || cc.cta) lines.push(`   · 카피: ${cc.headline} / ${cc.sub} / [${cc.cta}]`);
      if (f.note) lines.push(`   · 비고: ${f.note}`);
      (f.zones || []).forEach((z) => lines.push(`   · ${z.kind === "cta" ? "CTA 영역" : "텍스트 금지"}: ${z.side} ${z.px}px`));
      lines.push("");
    });
    const gg = GROUNDS.find((x) => x.id === grounds) || GROUNDS[0];
    lines.push("[공통 가이드]");
    lines.push("· 색상 모드: RGB (CMYK 납품 금지)");
    lines.push("· 세이프존: 사이즈 10% 내측에 핵심 요소 배치");
    lines.push("· 비교 표현(세무사·국세청·홈택스)·단정 표현('무조건')·시간 명시('N분 내') 금지");
    lines.push("");
    lines.push(`[근거조항 · 구분: ${gg.label} (평균 ${gg.amount}원)] — 금액 포함 소재 하단 필수 표기`);
    lines.push("· 영상용 (전체):");
    lines.push(groundsFull(gg));
    lines.push("· 배너(DA)용 (축약):");
    lines.push(groundsShort(gg));
    return lines.join("\n");
  }, [cart, campaign, copyByPlatform, copyEdits, grounds]);

  const copyBrief = async () => {
    try { await navigator.clipboard.writeText(briefText); setToast("브리프를 복사했어요"); }
    catch { setToast("복사 실패 — 직접 선택해 주세요"); }
    setTimeout(() => setToast(""), 2200);
  };
  const downloadBrief = () => {
    const blob = new Blob([briefText], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `소재발주_${(campaign || "브리프").replace(/\s/g, "")}.txt`;
    a.click(); URL.revokeObjectURL(a.href);
  };

  return (
    <div>
      {/* 파이프라인 배너 */}
      <div style={{ background: T.pale, border: `1px solid ${T.line}`, borderRadius: 12, padding: "12px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontFamily: UI, fontSize: 13, color: T.navy }}>
          {aiResult ? <>AI 카피가 소재 시안과 발주서에 자동 반영돼요. </> : <>먼저 <b>① AI 생성</b>에서 카피를 만들면 소재에 자동으로 얹혀요. </>}
          선택 채널: <b>{channels.map((id) => (PLATFORMS.find((p) => p.id === id) || {}).name).join(", ") || "없음"}</b>
        </div>
        <button onClick={addChannelSet} style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 700, padding: "8px 14px", borderRadius: 9, border: "none", background: T.blue, color: T.white, cursor: "pointer" }}>선택 채널 소재 일괄 담기</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "230px 1fr 300px", gap: 18, alignItems: "start" }}>
        {/* 좌 */}
        <div>
          <div style={{ fontFamily: MONO, fontSize: 11, color: T.sub, letterSpacing: 1, marginBottom: 8 }}>PLATFORM</div>
          <div className="flex flex-wrap gap-2" style={{ marginBottom: 18 }}>
            {PLATFORMS.map((p, i) => (
              <button key={p.id} onClick={() => { setPlatIdx(i); setFmtId(p.formats[0].id); }}
                style={{ fontFamily: UI, fontSize: 13, fontWeight: 600, padding: "6px 11px", borderRadius: 8, cursor: "pointer", border: `1px solid ${i === platIdx ? T.blue : T.line}`, background: i === platIdx ? T.blue : T.white, color: i === platIdx ? T.white : T.ink }}>
                {p.name}
              </button>
            ))}
          </div>
          <div style={{ fontFamily: MONO, fontSize: 11, color: T.sub, letterSpacing: 1, marginBottom: 8 }}>FORMAT</div>
          <div className="flex flex-col gap-2">
            {plat.formats.map((f) => {
              const active = f.id === fmtId;
              const added = cart.includes(f.id);
              return (
                <button key={f.id} onClick={() => setFmtId(f.id)}
                  style={{ textAlign: "left", fontFamily: UI, padding: "9px 11px", borderRadius: 9, cursor: "pointer", border: `1px solid ${active ? T.blue : T.line}`, background: active ? T.pale : T.white }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: T.ink }}>{f.label}{added && <span style={{ color: T.blue }}> ●</span>}</div>
                  <div style={{ fontFamily: MONO, fontSize: 11, color: T.sub, marginTop: 2 }}>{f.w}×{f.h} · {f.ratio}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* 중 */}
        <div style={{ background: T.white, border: `1px solid ${T.line}`, borderRadius: 14, padding: 24, display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
            <div>
              <div style={{ fontFamily: UI, fontSize: 16, fontWeight: 700, color: T.navy }}>{fmt.platform} · {fmt.label}</div>
              <div style={{ fontFamily: UI, fontSize: 12.5, color: T.sub, marginTop: 2 }}>{fmt.fmt} · 최대 {fmt.max}</div>
            </div>
            <button onClick={toggleCart} style={{ fontFamily: UI, fontSize: 13, fontWeight: 700, padding: "8px 14px", borderRadius: 9, cursor: "pointer", border: `1px solid ${T.blue}`, background: inCart ? T.white : T.blue, color: inCart ? T.blue : T.white }}>{inCart ? "✓ 담김" : "＋ 담기"}</button>
          </div>
          <AdPreview fmt={fmt} headline={curCopy.headline || undefined} />
          <div style={{ marginTop: 18, width: "100%", background: T.pale, borderRadius: 10, padding: "14px", border: `1px solid ${T.line}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 700, color: T.navy }}>
                소재 텍스트 · {fmt.platform}
                <span style={{ fontFamily: MONO, fontSize: 9.5, marginLeft: 6, padding: "1px 6px", borderRadius: 4, background: edited ? "#FFF1F1" : (hasBase ? "#EAF0FF" : T.white), color: edited ? T.coral : (hasBase ? T.blue : T.sub), border: `1px solid ${edited ? T.coral : (hasBase ? T.blue : T.line)}` }}>{edited ? "편집됨" : (hasBase ? "AI 생성" : "직접 입력")}</span>
              </div>
              {edited && <button onClick={resetCopy} style={{ fontFamily: UI, fontSize: 11.5, color: T.sub, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>AI값 되돌리기</button>}
            </div>
            {[{ k: "headline", label: "헤드라인", lim: lim.h }, { k: "sub", label: "서브카피", lim: lim.s }, { k: "cta", label: "CTA", lim: lim.c }].map((f) => {
              const len = (curCopy[f.k] || "").length;
              const over = len > f.lim;
              return (
                <div key={f.k} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                  <span style={{ fontFamily: MONO, fontSize: 10, color: T.sub, width: 52, flex: "none" }}>{f.label}</span>
                  <input value={curCopy[f.k]} onChange={(e) => setCopy(f.k, e.target.value)} placeholder={`${f.label} 입력`}
                    style={{ flex: 1, fontFamily: UI, fontSize: 13, padding: "7px 10px", borderRadius: 7, border: `1px solid ${over ? T.coral : T.line}`, background: T.white, color: T.ink, outline: "none" }} />
                  <span style={{ fontFamily: MONO, fontSize: 10, width: 46, flex: "none", textAlign: "right", color: over ? T.coral : T.sub }}>{len}/{f.lim}</span>
                </div>
              );
            })}
            <div style={{ fontFamily: UI, fontSize: 11, color: T.sub, marginTop: 8 }}>{fmt.platform} 글자수 기준 H{lim.h}·S{lim.s}·C{lim.c} · 초과 시 빨강. 헤드라인은 미리보기·발주서에 반영돼요.{fmt.note ? ` · ${fmt.note}` : ""}</div>
          </div>
          <div style={{ marginTop: 12, width: "100%" }}>
            {warns.length > 0 && (
              <div style={{ background: "#FFF1F1", border: `1px solid ${T.coral}`, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>
                <div style={{ fontFamily: UI, fontSize: 12, fontWeight: 700, color: T.coral, marginBottom: 4 }}>⚠ 활용 불가 문구 {warns.length}건 — 수정 필요</div>
                {warns.map((w, i) => <div key={i} style={{ fontFamily: UI, fontSize: 12, color: T.navy, lineHeight: 1.6 }}>· {w}</div>)}
              </div>
            )}
            <div style={{ background: T.pale, border: `1px solid ${T.line}`, borderRadius: 10, padding: "11px 13px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, gap: 8 }}>
                <span style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 700, color: T.navy }}>근거조항 {isVideo ? "· 영상(전체)" : "· 배너(축약)"}</span>
                <select value={grounds} onChange={(e) => setGrounds(e.target.value)} style={{ fontFamily: UI, fontSize: 12, padding: "4px 8px", borderRadius: 7, border: `1px solid ${T.line}`, background: T.white, color: T.ink }}>
                  {GROUNDS.map((gx) => <option key={gx.id} value={gx.id}>{gx.label} · {gx.amount}원</option>)}
                </select>
              </div>
              {hasAmount && <div style={{ fontFamily: UI, fontSize: 11.5, color: T.coral, marginBottom: 6 }}>※ 금액이 포함된 카피 — 아래 근거조항을 소재 하단에 필수 표기</div>}
              {g.labelNote && <div style={{ fontFamily: UI, fontSize: 11.5, color: T.navy, marginBottom: 6, fontWeight: 600 }}>※ {g.labelNote}</div>}
              <div style={{ fontFamily: MONO, fontSize: 10.5, color: T.sub, whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{isVideo ? groundsFull(g) : groundsShort(g)}</div>
            </div>
          </div>
          <div className="flex gap-4" style={{ marginTop: 14, fontFamily: MONO, fontSize: 11, color: T.sub }}>
            <span style={{ color: T.blue }}>▦ SAFE 10%</span>
            <span style={{ color: T.coral }}>▦ 텍스트 금지</span>
            <span style={{ color: T.blue }}>▦ CTA 영역</span>
          </div>
        </div>

        {/* 우 */}
        <div style={{ background: T.navy, borderRadius: 14, padding: 18, color: T.white, position: "sticky", top: 12 }}>
          <div style={{ fontFamily: UI, fontWeight: 700, fontSize: 15, marginBottom: 4 }}>발주 브리프</div>
          <div style={{ fontFamily: MONO, fontSize: 11, opacity: 0.7, marginBottom: 14 }}>{cart.length} ITEMS</div>
          {cart.length === 0 ? (
            <div style={{ fontFamily: UI, fontSize: 13, opacity: 0.7, lineHeight: 1.6, padding: "10px 0" }}>위에서 <b>일괄 담기</b>를 누르거나 소재별로 담으면 에이전시 발주서로 정리됩니다.</div>
          ) : (
            <div className="flex flex-col gap-2" style={{ marginBottom: 14, maxHeight: 240, overflowY: "auto" }}>
              {cart.map((id) => {
                const f = FMT_BY_ID[id];
                return (
                  <div key={id} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 600 }}>{f.platform} · {f.label}</div>
                      <div style={{ fontFamily: MONO, fontSize: 11, opacity: 0.7 }}>{f.w}×{f.h}</div>
                    </div>
                    <button onClick={() => setCart((c) => c.filter((x) => x !== id))} style={{ background: "none", border: "none", color: T.coral, cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
          <div className="flex gap-2">
            <button onClick={copyBrief} disabled={!cart.length} style={{ flex: 1, fontFamily: UI, fontSize: 13, fontWeight: 700, padding: "10px 0", borderRadius: 9, cursor: cart.length ? "pointer" : "not-allowed", border: "none", background: cart.length ? T.blue : "rgba(255,255,255,0.15)", color: T.white }}>복사</button>
            <button onClick={downloadBrief} disabled={!cart.length} style={{ flex: 1, fontFamily: UI, fontSize: 13, fontWeight: 700, padding: "10px 0", borderRadius: 9, cursor: cart.length ? "pointer" : "not-allowed", border: `1px solid rgba(255,255,255,0.3)`, background: "transparent", color: T.white }}>.txt</button>
          </div>
          {toast && <div style={{ marginTop: 10, fontFamily: UI, fontSize: 12, textAlign: "center", opacity: 0.85 }}>{toast}</div>}
        </div>
      </div>
    </div>
  );
}

// ── ② 랜딩페이지 빌더 (AI 결과로 자동 구성) ────────────────────
function LandingModule({ campaign, setCampaign, aiResult, goTo }) {
  const CBLUE = "#355AFF";
  const TIER_COLORS = ["#10C8A3", CBLUE, "#FF7A3C"];
  const [eyebrow, setEyebrow] = useState("[병원비 환급] 놓친 병원비, 돌려받기");
  const [head1, setHead1] = useState("내가 낸 병원비");
  const [head2, setHead2] = useState("돌려받으세요");
  const [kvUrl, setKvUrl] = useState("");
  const [bg, setBg] = useState("#0B1428");
  const [cta, setCta] = useState("내 환급 신청액 확인하기");
  const [tiers, setTiers] = useState([
    { amount: "1,000P", title: "매일 출석 미션", color: TIER_COLORS[0] },
    { amount: "2,000P", title: "숨은 환급액 조회", color: TIER_COLORS[1] },
    { amount: "5,000P", title: "친구 초대 챌린지", color: TIER_COLORS[2] },
  ]);
  const [steps, setSteps] = useState("삼쩜삼 앱 설치하기\n병원비 환급 조회하기\n환급 신청액 확인하기\n청구대행 신청하기");
  const [stats, setStats] = useState([
    { label: "세금 평균 환급액", value: "288,635", unit: "원" },
    { label: "병원비 평균 환급 신청액", value: "414,000", unit: "원" },
  ]);
  const [toast, setToast] = useState("");
  const [fromAI, setFromAI] = useState(false);

  // AI 랜딩 구조 → 입력 자동 채움
  const applyAI = () => {
    const L = aiResult && aiResult["랜딩"];
    if (!L) return;
    if (L.eyebrow) setEyebrow(L.eyebrow);
    if (L.headline1) setHead1(L.headline1);
    if (L.headline2) setHead2(L.headline2);
    if (L.cta) setCta(L.cta);
    if (Array.isArray(L.tiers)) setTiers(L.tiers.slice(0, 3).map((t, i) => ({ amount: t.amount || "", title: t.title || "", color: TIER_COLORS[i] || CBLUE })));
    setFromAI(true);
  };
  useEffect(() => { if (aiResult && aiResult["랜딩"]) applyAI(); /* eslint-disable-next-line */ }, [aiResult]);

  const setTier = (i, k, v) => setTiers((a) => a.map((t, j) => (j === i ? { ...t, [k]: v } : t)));
  const setStat = (i, k, v) => setStats((a) => a.map((s, j) => (j === i ? { ...s, [k]: v } : s)));

  const landingHTML = useMemo(() => {
    const esc = (s) => String(s).replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const hex = bg || "#0B1428";
    const lum = (h) => { const n = h.replace("#", ""); const r = parseInt(n.slice(0, 2), 16), gg = parseInt(n.slice(2, 4), 16), b = parseInt(n.slice(4, 6), 16); return (0.299 * r + 0.587 * gg + 0.114 * b) / 255; };
    const light = lum(hex) > 0.6;
    const c = light
      ? { page: "#e8eef9", text: "#0B1428", sub: "#5a6b85", card: "#ffffff", kv: "#eef3fd", kvtxt: "#7385a8", hero: `radial-gradient(130% 75% at 50% 0,#dbe6ff,${hex})`, badgeBg: "#355AFF", badgeText: "#ffffff", badgeBorder: "#355AFF", hl: "#355AFF", three: "rgba(53,90,255,.10)", tierText: "#1a2740", statU: "#5a6b85", footc: "#8493ad", footb: "#dbe3f2", stepline: "rgba(255,255,255,.28)" }
      : { page: "#070d1d", text: "#ffffff", sub: "#8aa0c8", card: "#121d3a", kv: "#0f1f47", kvtxt: "#4b6aa8", hero: `radial-gradient(130% 75% at 50% 0,#1c3c7e,${hex})`, badgeBg: "rgba(53,90,255,.16)", badgeText: "#88a3ff", badgeBorder: "rgba(53,90,255,.5)", hl: "#5b82ff", three: "rgba(91,130,255,.16)", tierText: "#e7eefb", statU: "#cdd9f0", footc: "#5e6b86", footb: "#16223f", stepline: "rgba(255,255,255,.16)" };
    const kvBlock = kvUrl
      ? `<div class="kv" style="background:url('${kvUrl}') center/cover"></div>`
      : `<div class="kv"><span class="three">3</span><span class="kvtxt">KV 이미지 영역<br>(모델·강아지·3 모티프)</span></div>`;
    const tierHtml = tiers.map((t) => `      <div class="tier" style="--c:${t.color}"><div class="p">${esc(t.amount)}</div><div class="t">${esc(t.title)}</div></div>`).join("\n");
    const stepHtml = steps.split("\n").filter(Boolean).map((s, i) => `        <div class="step"><div class="n">${i + 1}</div><div>${esc(s)}</div></div>`).join("\n");
    const statHtml = stats.map((s) => `      <div class="stat"><div class="l">${esc(s.label)}</div><div class="v">${esc(s.value)}<span class="u"> ${esc(s.unit)}</span></div></div>`).join("\n");
    return `<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>${esc(campaign || "삼쩜삼 이벤트")}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif}
body{background:${c.page}}
.wrap{max-width:420px;margin:0 auto;background:${hex};color:${c.text};overflow:hidden}
.hero{position:relative;padding:38px 22px 34px;text-align:center;background:${c.hero}}
.badge{display:inline-block;background:${c.badgeBg};color:${c.badgeText};border:1px solid ${c.badgeBorder};font-size:12px;font-weight:700;padding:5px 13px;border-radius:999px;margin-bottom:16px}
.hero h1{font-size:29px;font-weight:800;line-height:1.32;letter-spacing:-.02em}
.hero h1 .hl{color:${c.hl}}
.kv{position:relative;margin:24px auto 0;width:100%;height:230px;border-radius:18px;background:${c.kv};display:flex;align-items:center;justify-content:center;overflow:hidden}
.kv .three{position:absolute;font-family:'Space Mono',monospace;font-size:150px;font-weight:700;color:${c.three}}
.kv .kvtxt{position:relative;color:${c.kvtxt};font-size:13px;line-height:1.6;text-align:center}
.cta{display:block;margin:22px auto 0;background:#355AFF;color:#fff;font-size:17px;font-weight:700;padding:16px;border-radius:14px;text-decoration:none;box-shadow:0 12px 30px rgba(53,90,255,.42)}
.sec{padding:38px 22px}
.sec h2{font-size:21px;font-weight:800;text-align:center;margin-bottom:20px;line-height:1.4}
.tier{display:flex;align-items:center;gap:14px;background:${c.card};border-radius:16px;padding:17px 18px;margin-bottom:11px;border-left:5px solid var(--c)}
.tier .p{font-family:'Space Mono',monospace;font-weight:700;font-size:19px;color:var(--c);min-width:78px}
.tier .t{font-size:15px;font-weight:600;color:${c.tierText}}
.stepwrap{background:#355AFF;border-radius:20px;padding:28px 22px}
.stepwrap h2{color:#fff;margin-bottom:14px}
.step{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid ${c.stepline}}
.step:last-child{border:none}
.step .n{flex:none;font-family:'Space Mono',monospace;font-weight:700;background:#fff;color:#355AFF;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.step div:last-child{font-size:15px;font-weight:600;color:#fff}
.stats{display:flex;flex-direction:column;gap:13px}
.stat{background:${c.card};border-radius:18px;padding:22px;text-align:center}
.stat .l{font-size:13px;color:${c.sub};margin-bottom:8px}
.stat .v{font-family:'Space Mono',monospace;font-size:33px;font-weight:700;color:${c.hl}}
.stat .u{font-size:15px;color:${c.statU};font-family:'Pretendard'}
footer{padding:26px 22px;font-size:11px;color:${c.footc};line-height:1.7;border-top:1px solid ${c.footb}}
</style></head>
<body><div class="wrap">
  <div class="hero">
    <span class="badge">${esc(eyebrow)}</span>
    <h1>${esc(head1)}<br><span class="hl">${esc(head2)}</span></h1>
    ${kvBlock}
    <a class="cta" href="#">${esc(cta)}</a>
  </div>
  <div class="sec"><h2>포인트 미션</h2>
${tierHtml}
  </div>
  <div class="sec"><div class="stepwrap"><h2>포인트는 이렇게 받을 수 있어요</h2>
${stepHtml}
  </div></div>
  <div class="sec"><h2>숨은 환급액까지<br>간편하게 찾아보세요</h2>
    <div class="stats">
${statHtml}
    </div>
  </div>
  <footer>본 이벤트는 삼쩜삼(자비스앤빌런즈) 주관으로 진행됩니다. 포인트 지급 조건 및 기간은 앱 내 공지를 따르며, 부정 참여 시 지급이 제한될 수 있습니다.</footer>
</div></body></html>`;
  }, [campaign, eyebrow, head1, head2, kvUrl, cta, tiers, steps, stats, bg]);

  const download = () => {
    const blob = new Blob([landingHTML], { type: "text/html;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${(campaign || "landing").replace(/\s/g, "")}.html`;
    a.click(); URL.revokeObjectURL(a.href);
    setToast("HTML 파일을 내보냈어요"); setTimeout(() => setToast(""), 2200);
  };

  const field = { fontFamily: UI, fontSize: 13.5, padding: "9px 11px", borderRadius: 9, border: `1px solid ${T.line}`, width: "100%", color: T.ink, outline: "none", background: T.white };
  const lbl = { fontFamily: MONO, fontSize: 11, color: T.sub, letterSpacing: 1, marginBottom: 6, display: "block" };

  return (
    <div>
      {/* 파이프라인 배너 */}
      <div style={{ background: T.pale, border: `1px solid ${T.line}`, borderRadius: 12, padding: "12px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontFamily: UI, fontSize: 13, color: T.navy }}>
          {aiResult && aiResult["랜딩"] ? (fromAI ? <>AI 전략·카피로 랜딩 메시지가 자동 구성됐어요. 필요하면 직접 수정하세요.</> : <>AI 결과가 있어요.</>) : <>먼저 <b>① AI 생성</b>에서 전략·카피를 만들면 여기에 자동으로 채워져요.</>}
        </div>
        <div className="flex gap-2">
          {aiResult && aiResult["랜딩"] && <button onClick={applyAI} style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 700, padding: "8px 13px", borderRadius: 9, border: `1px solid ${T.blue}`, background: T.white, color: T.blue, cursor: "pointer" }}>AI 결과로 다시 채우기</button>}
          <button onClick={() => goTo("ad")} style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 700, padding: "8px 14px", borderRadius: 9, border: "none", background: T.navy, color: T.white, cursor: "pointer" }}>③ 광고 소재 만들기 →</button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 18, alignItems: "start" }}>
        <div style={{ background: T.white, border: `1px solid ${T.line}`, borderRadius: 14, padding: 20, display: "flex", flexDirection: "column", gap: 15, maxHeight: 620, overflowY: "auto" }}>
          <div><span style={lbl}>CAMPAIGN</span><input value={campaign} onChange={(e) => setCampaign(e.target.value)} style={field} placeholder="캠페인명" /></div>
          <div><span style={lbl}>EYEBROW (뱃지)</span><input value={eyebrow} onChange={(e) => setEyebrow(e.target.value)} style={field} /></div>
          <div><span style={lbl}>HEADLINE 1</span><input value={head1} onChange={(e) => setHead1(e.target.value)} style={field} /></div>
          <div><span style={lbl}>HEADLINE 2 (블루 강조)</span><input value={head2} onChange={(e) => setHead2(e.target.value)} style={field} /></div>
          <div>
            <span style={lbl}>배경 색상</span>
            <div className="flex gap-2 items-center" style={{ flexWrap: "wrap" }}>
              {["#0B1428", "#0E1F4D", "#10243F", "#0A1530", "#F3F8FF", "#FFFFFF"].map((sw) => (
                <button key={sw} onClick={() => setBg(sw)} title={sw}
                  style={{ width: 26, height: 26, borderRadius: 7, background: sw, cursor: "pointer", border: `2px solid ${bg.toLowerCase() === sw.toLowerCase() ? T.blue : T.line}` }} />
              ))}
              <input type="color" value={bg} onChange={(e) => setBg(e.target.value)} title="직접 선택"
                style={{ width: 34, height: 30, padding: 0, border: `1px solid ${T.line}`, borderRadius: 7, background: "none", cursor: "pointer" }} />
              <span style={{ fontFamily: MONO, fontSize: 11, color: T.sub }}>{bg}</span>
            </div>
            <div style={{ fontFamily: UI, fontSize: 11, color: T.sub, marginTop: 5 }}>밝은 색을 고르면 글자색이 자동으로 어둡게 전환돼요.</div>
          </div>
          <div>
            <span style={lbl}>KV 이미지</span>
            <input value={kvUrl.startsWith("data:") ? "" : kvUrl} onChange={(e) => setKvUrl(e.target.value)} style={field} placeholder="이미지 URL 붙여넣기 (권장)" />
            <div className="flex gap-2 items-center" style={{ marginTop: 7 }}>
              <label style={{ fontFamily: UI, fontSize: 12.5, fontWeight: 600, color: T.blue, background: T.pale, border: `1px solid ${T.line}`, borderRadius: 8, padding: "7px 12px", cursor: "pointer" }}>
                파일 업로드
                <input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => setKvUrl(r.result); r.readAsDataURL(f); }} />
              </label>
              {kvUrl && <button onClick={() => setKvUrl("")} style={{ fontFamily: UI, fontSize: 12, color: T.sub, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>제거</button>}
              {kvUrl.startsWith("data:") && <span style={{ fontFamily: MONO, fontSize: 11, color: T.blue }}>업로드됨</span>}
            </div>
            <div style={{ fontFamily: UI, fontSize: 11, color: T.sub, marginTop: 5 }}>업로드는 빠른 시안 확인용 · 최종 내보내기는 URL이 가벼워요(HTML에 이미지가 통째로 박히는 것 방지).</div>
          </div>
          <div>
            <span style={lbl}>POINT 미션 (3티어)</span>
            <div className="flex flex-col gap-2">
              {tiers.map((t, i) => (
                <div key={i} className="flex gap-2 items-center">
                  <span style={{ width: 14, height: 14, borderRadius: 4, background: t.color, flex: "none" }} />
                  <input value={t.amount} onChange={(e) => setTier(i, "amount", e.target.value)} style={{ ...field, width: 84, fontFamily: MONO }} />
                  <input value={t.title} onChange={(e) => setTier(i, "title", e.target.value)} style={field} />
                </div>
              ))}
            </div>
          </div>
          <div><span style={lbl}>STEPS (줄바꿈 = 단계)</span><textarea value={steps} onChange={(e) => setSteps(e.target.value)} rows={4} style={{ ...field, resize: "vertical" }} /></div>
          <div>
            <span style={lbl}>환급액 통계 (2개)</span>
            <div className="flex flex-col gap-2">
              {stats.map((s, i) => (
                <div key={i} className="flex gap-2">
                  <input value={s.label} onChange={(e) => setStat(i, "label", e.target.value)} style={field} />
                  <input value={s.value} onChange={(e) => setStat(i, "value", e.target.value)} style={{ ...field, width: 96, fontFamily: MONO }} />
                </div>
              ))}
            </div>
          </div>
          <div><span style={lbl}>CTA</span><input value={cta} onChange={(e) => setCta(e.target.value)} style={field} /></div>
          <button onClick={download} style={{ fontFamily: UI, fontSize: 14, fontWeight: 700, padding: "12px 0", borderRadius: 10, border: "none", background: T.navy, color: T.white, cursor: "pointer" }}>HTML 내보내기</button>
          {toast && <div style={{ fontFamily: UI, fontSize: 12, color: T.blue, textAlign: "center" }}>{toast}</div>}
        </div>
        <div style={{ border: `1px solid ${T.line}`, borderRadius: 14, overflow: "hidden", background: "#070d1d" }}>
          <div style={{ background: T.navy, padding: "8px 14px", fontFamily: MONO, fontSize: 11, color: "rgba(255,255,255,0.6)", borderBottom: `1px solid #16223f` }}>LIVE PREVIEW · 이벤트 랜딩</div>
          <iframe title="preview" srcDoc={landingHTML} style={{ width: "100%", height: 600, border: "none", display: "block" }} />
        </div>
      </div>
    </div>
  );
}

// ── ① AI 생성 모듈 (브리프 → 전략·랜딩구조·채널카피) ──────────────
const AI_CHANNELS = [
  { id: "instagram", name: "인스타그램" },
  { id: "kakao", name: "카카오" },
  { id: "youtube", name: "유튜브" },
  { id: "naver", name: "네이버" },
  { id: "meta", name: "메타" },
  { id: "blind", name: "블라인드" },
];

const CONCEPTS = [
  { id: "summer", label: "여름휴가", hint: "여름 바캉스·휴가 시즌. '휴가비는 환급으로 챙기자'는 시원하고 들뜬 톤. 여행·바다·시원함 모티프." },
  { id: "treasure", label: "보물찾기", hint: "숨은 돈을 보물에 비유. 탐험·지도·보물상자·X 표시 모티프. 머니파인더즈의 '찾는다' 컨셉과 직결되는 모험적 톤." },
  { id: "newyear", label: "연말·새해", hint: "한 해를 정산하고 새해를 준비하는 시즌. 연말정산·새 출발·계획 모티프. 따뜻하게 마무리하고 산뜻하게 시작하는 톤." },
  { id: "chuseok", label: "추석·한가위", hint: "추석 명절. 풍요·보름달·넉넉함·명절 보너스/용돈 모티프. 명절에 받는 든든한 환급이라는 푸근한 톤." },
];

// 카피 스타일 레퍼런스 (few-shot 학습용)
const STYLE_TECHNIQUES = `- 이중 의미 네이밍: 핵심 단어에 캠페인 의미와 컨셉 의미를 겹친다 (예: '리턴'=환급 return + 여행에서 돌아옴).
- '환급' 대신 '돌려받다' 같은 부드러운 동사로 거부감을 줄이고 자연스러운 행동을 유도.
- 서브카피는 '공감 → 서비스 소개 → 시즌/컨셉 컨텍스트 연결'의 3단 구조.
- CTA는 '내 환급금'처럼 개인화 표현 + '무료'로 진입장벽을 낮춘다.
- 담담하지만 확신 있게, 짧고 단호하게.`;
const STYLE_REFS = [
  {
    concept: "summer", name: "리턴 트립", hashtag: "#리턴트립",
    main: "돌려받은 돈으로 이번 여름을 채우세요.",
    sub: "내가 낸 세금, 내가 돌려받아야죠. 삼쩜삼이 숨어 있던 환급금을 찾아드리면, 그 돈으로 이번 여름을 조금 더 특별하게.",
    ctaP: "내 환급금 확인하기", ctaS: "지금 무료 조회 →",
  },
];

function AIModule({ campaign, setCampaign, channels, setChannels, aiResult, setAiResult, goTo }) {
  const [period, setPeriod] = useState("2026.04.20 – 06.25");
  const [msg, setMsg] = useState("숨은 돈, 끝까지 찾는다. 종합소득세 환급 시즌 인지·전환 동시 공략.");
  const [target, setTarget] = useState("프리랜서·N잡러 20–40대, 환급 미경험자");
  const [concept, setConcept] = useState("treasure");
  const [direction, setDirection] = useState("‘당신만 모르고 있다’는 약간의 충격과 발견의 감정 (FOMO)");
  const [extra, setExtra] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [outTab, setOutTab] = useState("strategy");
  const [toast, setToast] = useState("");

  const toggleCh = (id) => setChannels((c) => (c.includes(id) ? c.filter((x) => x !== id) : [...c, id]));

  const specRows = useMemo(() => {
    const rows = [];
    channels.forEach((id) => {
      const p = PLATFORMS.find((x) => x.id === id);
      if (p) p.formats.forEach((f) => rows.push({ id: f.id, platform: p.name, label: f.label, w: f.w, h: f.h, ratio: f.ratio, fmt: f.fmt }));
    });
    return rows;
  }, [channels]);
  const specText = useMemo(() => specRows.map((r) => `${r.platform} | ${r.label} | ${r.w}×${r.h} | ${r.ratio} | ${r.fmt}`).join("\n"), [specRows]);

  const generate = async () => {
    setError("");
    if (!msg.trim()) { setError("핵심 메시지를 입력해 주세요."); return; }
    if (!channels.length) { setError("채널을 하나 이상 선택해 주세요."); return; }
    setLoading(true);
    const chNames = channels.map((id) => (PLATFORMS.find((x) => x.id === id) || {}).name).join(", ");
    const cpt = CONCEPTS.find((c) => c.id === concept) || CONCEPTS[0];
    const chSpec = channels.map((id) => { const nm = (AI_CHANNELS.find((x) => x.id === id) || {}).name || id; const L = limForPlat(id); return `{"channel":"${nm}","headline":"헤드라인 ${L.h}자 이내","sub":"서브카피 ${L.s}자 이내","cta":"CTA ${L.c}자 이내"}`; }).join(",");
    const ref = STYLE_REFS.find((r) => r.concept === concept);
    const styleBlock = `[카피 스타일 레퍼런스 — 이 톤·기법을 학습해 적용]\n${STYLE_TECHNIQUES}` + (ref
      ? `\n\n우수 예시 〈${ref.name}〉 (${ref.hashtag}):\n- 메인: ${ref.main}\n- 서브: ${ref.sub}\n- CTA: ${ref.ctaP} / ${ref.ctaS}\n위 예시는 참고용입니다. 그대로 베끼지 말고, 같은 기법을 이번 컨셉·캠페인에 맞게 변형하세요.`
      : `\n현재 컨셉(${cpt.label})에 맞는 이중 의미 네이밍과 카피를 위 기법으로 새로 제안하세요.`);
    const prompt = `당신은 삼쩜삼(자비스앤빌런즈) 브랜드 마케팅 전문가입니다.
브랜드 플랫폼: "숨은 돈, 끝까지 찾는다" / 종합소득세·세금 환급 서비스. 포인트 적립 이벤트 형태.

아래 브리프로 프로모션 산출물을 생성하세요.
- 캠페인명: ${campaign || "신규 프로모션"}
- 기간: ${period || "미정"}
- 컨셉(무엇을 말하나): ${msg}
- 메인 방향성(어떻게 말하나): ${direction || "발견·FOMO 감정"}
- 타겟: ${target || "20–40대 세금 환급 잠재 유저"}
- 컨셉: ${cpt.label} — ${cpt.hint}
- 집행 채널: ${chNames}${extra ? `\n- 추가 컨텍스트: ${extra}` : ""}

[작성 원칙]
- 전략 기획과 모든 카피는 위 '캠페인명', '핵심 메시지', '타겟'을 명시적으로 반영하세요. 캠페인명은 카피·뱃지·헤드라인에 자연스럽게 녹이고, 핵심 메시지의 키워드가 카피에 드러나야 합니다.
- 전체 톤·소재·비유는 '컨셉(${cpt.label})'을 일관되게 따르세요.

[컴플라이언스 — 반드시 준수]
- 단정 표현 금지: '무조건', '누구나 받는다' 등 전원이 환급받는다는 오인을 주지 마세요.
- 금지 표현: '환급금 도착/새 환급금/통지/고지', '계산된·산정된·수령가능·미환급 환급금', '제2의 근로장려금', 세무사·국세청·홈택스 비교, 'N분 내'·'N개월 내' 등 구체적 시간 명시.
- 환급액은 단독·단정 금지. 반드시 '평균 예상 환급액' 또는 '평균 신청 환급액'으로 범퍼를 붙이세요.
- '수수료'는 '이용료'로 표현하세요.

[공식 수치 — 이 수치만 사용, 임의 수치 금지]
- 1인 평균 예상 환급액(전체) 288,635원 / 환급 대상자 3명 중 2명(71%) / 누적 환급액 2조원 / 누적 가입자 2,400만명 / 최근 5개년치 조회
- 타겟별 평균 신청액: 근로소득자 304,500원·프리랜서 191,932원·사업소득자 297,682원·40대 이하 268,344원·50대 381,014원·60대 342,904원
- 안전 USP: 안심환급보상제(환급 불가 시 이용료 100% 환불), 후결제 서비스
- 병원비(의료비) 평균 환급 신청액 414,000원 (2025.07.01~2026.02.28, 신청 고객 누적 155,658명). ※ 의료비는 '예상 환급액'이 아닌 '환급 신청액'으로 표기하고, 실손보험에 따라 본인부담금이 발생할 수 있음을 전제로 단정 표현을 피하세요.

[톤 & 카피 원칙]
- 담담하고 확신에 찬, 과장 없이 사실로 압박하는 톤. 짧고 단호하게, 동사로 끝내기.
- 타겟의 언어 사용('세금신고'→'내 돈 찾기'), 발견·개인화 느낌. 과도한 감탄('놀라운!','대박!')·모호한 표현('더 나은 내일') 금지.

{

    try {

      });
      const data = await res.json();
      const raw = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
      let parsed;
      try { parsed = JSON.parse(raw.replace(/```json|```/g, "").trim()); }
      catch { throw new Error("응답 파싱 실패 — 다시 시도해 주세요."); }
      setAiResult(parsed);
      setOutTab("strategy");
    } catch (e) {

    setLoading(false);
  };

  const copy = async (text) => { try { await navigator.clipboard.writeText(text); setToast("복사했어요"); } catch { setToast("복사 실패"); } setTimeout(() => setToast(""), 1800); };

  const field = { fontFamily: UI, fontSize: 13.5, padding: "9px 11px", borderRadius: 9, border: `1px solid ${T.line}`, width: "100%", color: T.ink, outline: "none", background: T.white };

  const styleRef = STYLE_REFS.find((r) => r.concept === concept);
  const outTabs = [{ id: "strategy", label: "전략 기획", ai: true }, { id: "copy", label: "채널별 카피", ai: true }, { id: "spec", label: "소재 스펙", ai: false }];

  return (

          <div><span style={lbl}>기간</span><input value={period} onChange={(e) => setPeriod(e.target.value)} style={field} /></div>
        </div>
        <div style={{ marginBottom: 12 }}><span style={lbl}>컨셉 — 무엇을 말하나 (핵심 메시지)</span><textarea value={msg} onChange={(e) => setMsg(e.target.value)} rows={2} style={{ ...field, resize: "vertical" }} /></div>
        <div style={{ marginBottom: 12 }}><span style={lbl}>메인 방향성 — 어떻게 말하나 (감정·관점)</span><textarea value={direction} onChange={(e) => setDirection(e.target.value)} rows={2} style={{ ...field, resize: "vertical" }} placeholder="예) ‘당신만 모르고 있다’는 충격과 FOMO" /></div>
        <div style={{ marginBottom: 16 }}><span style={lbl}>타겟</span><input value={target} onChange={(e) => setTarget(e.target.value)} style={field} /></div>
        <span style={lbl}>컨셉 (전략·카피·랜딩 톤 결정)</span>
        <div className="flex flex-wrap gap-2" style={{ marginBottom: 16 }}>
          {CONCEPTS.map((c) => {

            return (
              <button key={c.id} onClick={() => setConcept(c.id)} title={c.hint} style={{ fontFamily: UI, fontSize: 13, fontWeight: 600, padding: "6px 13px", borderRadius: 20, cursor: "pointer", border: `1px solid ${on ? T.blue : T.line}`, background: on ? T.blue : T.white, color: on ? T.white : T.ink }}>{c.label}</button>
            );
          })}
        </div>
        <span style={lbl}>집행 채널 (복수 선택 · 랜딩·소재에 자동 반영)</span>
        <div className="flex flex-wrap gap-2" style={{ marginBottom: 16 }}>
          {AI_CHANNELS.map((ch) => {
            const on = channels.includes(ch.id);
            return (
              <button key={ch.id} onClick={() => toggleCh(ch.id)} style={{ fontFamily: UI, fontSize: 13, fontWeight: 600, padding: "6px 13px", borderRadius: 20, cursor: "pointer", border: `1px solid ${on ? T.blue : T.line}`, background: on ? T.blue : T.white, color: on ? T.white : T.ink }}>{ch.name}</button>
            );
          })}
        </div>
        {styleRef && (
          <div style={{ marginBottom: 16, background: T.pale, border: `1px dashed ${T.blue}`, borderRadius: 10, padding: "10px 13px" }}>

            <div style={{ fontFamily: UI, fontSize: 12.5, color: T.navy, lineHeight: 1.6 }}>〈{styleRef.name}〉 {styleRef.hashtag} 스타일 참조 — "{styleRef.main}" 같은 이중 의미·부드러운 동사 톤으로 생성돼요.</div>
          </div>
        )}
        <div><span style={lbl}>추가 컨텍스트 (선택)</span><textarea value={extra} onChange={(e) => setExtra(e.target.value)} rows={2} style={{ ...field, resize: "vertical" }} placeholder="예) 예산 3억, 전환 KPI는 간편인증 완료" /></div>
        <button onClick={generate} disabled={loading} style={{ width: "100%", marginTop: 16, fontFamily: UI, fontSize: 15, fontWeight: 700, padding: "13px 0", borderRadius: 11, border: "none", cursor: loading ? "not-allowed" : "pointer", background: loading ? T.sub : T.navy, color: T.white }}>{loading ? "생성 중…" : "AI로 전략·카피·랜딩 구조 생성"}</button>
        {error && <div style={{ marginTop: 12, fontFamily: UI, fontSize: 13, color: T.coral, background: "#FFF1F1", borderRadius: 9, padding: "10px 12px" }}>{error}</div>}
        {toast && <div style={{ marginTop: 12, fontFamily: UI, fontSize: 12.5, color: T.blue, textAlign: "center" }}>{toast}</div>}
      </div>

      <div style={{ background: T.white, border: `1px solid ${T.line}`, borderRadius: 14, overflow: "hidden" }}>
        <div className="flex" style={{ borderBottom: `1px solid ${T.line}` }}>
          {outTabs.map((t) => (
            <button key={t.id} onClick={() => setOutTab(t.id)} style={{ fontFamily: UI, fontSize: 13.5, fontWeight: 700, padding: "12px 18px", cursor: "pointer", background: "none", border: "none", color: outTab === t.id ? T.navy : T.sub, borderBottom: `2px solid ${outTab === t.id ? T.blue : "transparent"}` }}>{t.label}{t.ai && <span style={{ fontFamily: MONO, fontSize: 9, color: T.blue, marginLeft: 5 }}>AI</span>}</button>
          ))}
        </div>
        <div style={{ padding: 22 }}>
          {outTab === "spec" ? (
            <div>
              <div style={{ fontFamily: UI, fontSize: 13, color: T.sub, marginBottom: 12 }}>선택 채널 기준 {specRows.length}개 소재 · 키트 데이터 기반 (0토큰)</div>
              <div style={{ fontFamily: MONO, fontSize: 12, background: T.pale, border: `1px solid ${T.line}`, borderRadius: 9, padding: 14, whiteSpace: "pre-wrap", lineHeight: 1.7, color: T.navy }}>{`채널 | 소재 | 사이즈 | 비율 | 포맷\n${"─".repeat(46)}\n${specText}`}</div>
            </div>
          ) : !aiResult ? (

}

function PromotionKit() {
  const [tab, setTab] = useState("ai");
  const [cart, setCart] = useState([]);
  const [campaign, setCampaign] = useState("머니파인더즈");
  const [channels, setChannels] = useState(["instagram", "kakao", "youtube"]);
  const [aiResult, setAiResult] = useState(null);

  useEffect(() => {
    const links = [
      "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css",
      "https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap",
    ];
    const els = links.map((href) => { const e = document.createElement("link"); e.rel = "stylesheet"; e.href = href; document.head.appendChild(e); return e; });
    return () => els.forEach((e) => e.remove());
  }, []);

  const tabBtn = (id, label) => (
    <button onClick={() => setTab(id)} style={{ fontFamily: UI, fontSize: 14, fontWeight: 700, padding: "9px 18px", borderRadius: 10, cursor: "pointer", border: "none", background: tab === id ? T.white : "transparent", color: tab === id ? T.navy : "rgba(255,255,255,0.75)", boxShadow: tab === id ? "0 2px 8px rgba(3,54,99,0.12)" : "none" }}>{label}</button>

  return (
    <div style={{ fontFamily: UI, background: "#F6F8FE", minHeight: "100vh", padding: "0 0 40px" }}>

          <div>
            <div style={{ color: T.white, fontWeight: 800, fontSize: 16, letterSpacing: "-0.01em" }}>삼쩜삼 프로모션 키트</div>

          {tabBtn("landing", "② 랜딩페이지")}
          {tabBtn("ad", "③ 광고 소재")}
        </div>
      </div>
      <div style={{ padding: "24px 28px", maxWidth: 1180, margin: "0 auto" }}>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PromotionKit />);
